<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
    <title>Manage Storage Locations</title>
</head>
<body>
    <section>
        <div class="row">
            <div class="col-md-12">
                <h2>Manage Storage Locations</h2>
                <hr>
            </div>
        </div>

        <!-- Create New Storage Location Form -->
        <div class="card mb-4">
            <div class="card-header bg-light">
                <h5 class="mb-0">Create New Storage Location</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/storage-locations/create}" method="post" th:object="${newStorageLocation}">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label required-field">Location Name</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}" 
                                   required maxlength="256" placeholder="e.g., Shelf Top">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
                                Location name is required
                            </div>
                        </div>
                        <div class="col-md-6 mb-3 d-flex align-items-end">
                            <button type="submit" class="btn btn-success">Create Storage Location</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Storage Locations List -->
        <div class="card">
            <div class="card-header bg-light">
                <h5 class="mb-0">Existing Storage Locations</h5>
            </div>
            <div class="card-body">
                <div th:if="${#lists.isEmpty(storageLocations)}" class="alert alert-info">
                    No storage locations found. Create your first storage location using the form above.
                </div>
                <div th:if="${!#lists.isEmpty(storageLocations)}" class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Usage</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="location : ${storageLocations}">
                                <td th:text="${location.id}">ID</td>
                                <td>
                                    <span th:text="${location.name}">Location Name</span>
                                </td>
                                <td>
                                    <span th:if="${inUse_} + ${location.id}" class="badge bg-info text-dark">
                                        In use by <span th:text="${usageCount_} + ${location.id}">0</span> part(s)
                                    </span>
                                    <span th:unless="${inUse_} + ${location.id}" class="badge bg-secondary">Not in use</span>
                                </td>
                                <td>
                                    <!-- Edit Button (triggers modal) -->
                                    <button type="button" class="btn btn-sm btn-primary" 
                                            data-bs-toggle="modal" th:data-bs-target="'#editModal_' + ${location.id}">
                                        Edit
                                    </button>
                                    
                                    <!-- Delete Button (only if not in use) -->
                                    <form th:unless="${inUse_} + ${location.id}" 
                                          th:action="@{/storage-locations/{id}/delete(id=${location.id})}" 
                                          method="post" class="d-inline delete-form">
                                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                                    </form>
                                    
                                    <!-- Disabled Delete Button (if in use) -->
                                    <button th:if="${inUse_} + ${location.id}" 
                                            class="btn btn-sm btn-danger" disabled 
                                            title="Cannot delete while in use by electronic parts">
                                        Delete
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Edit Modals (one for each storage location) -->
        <div th:each="location : ${storageLocations}" th:id="'editModal_' + ${location.id}" class="modal fade" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Edit Storage Location</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/storage-locations/{id}/update(id=${location.id})}" method="post">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="editName" class="form-label required-field">Location Name</label>
                                <input type="text" class="form-control" id="editName" name="name" 
                                       th:value="${location.name}" required maxlength="256">
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Add JavaScript for delete confirmation -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const deleteForms = document.querySelectorAll('.delete-form');
            deleteForms.forEach(form => {
                form.addEventListener('submit', function(event) {
                    if (!confirm('Are you sure you want to delete this storage location? This action cannot be undone.')) {
                        event.preventDefault();
                    }
                });
            });
        });
    </script>
</body>
</html>
